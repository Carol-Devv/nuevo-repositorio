<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi web</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial;
            background: linear-gradient(to right, #74ebd5, #acb6e5);
            margin: 0;
        }

        header {
            background-color: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 30px;
            text-align: center;
        }

        header h1 {
            margin: 0;
            font-size: 40px;
        }

        section {
            padding: 20px;
            margin: 30px auto;
            width: 80%;
            background: white;
            border-radius: 15px;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.2);
            transition: transform 0.3s;
        }

        section:hover {
            transform: scale(1.02);
        }

        h2 {
            color: #444;
            border-bottom: 2px solid #74ebd5;
            padding-bottom: 5px;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        ul li {
            background: #74ebd5;
            margin: 10px 0;
            padding: 10px;
            border-radius: 8px;
            color: #333;
            font-weight: bold;
        }


        footer {
            text-align: center;
            padding: 15px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            margin-top: 30px;
        }
    </style>
</head>

<body>

<header>
    <h1>Mi web</h1>
    <p>Práctica RA3</p>
</header>

<section>
    <h2>Hola</h2>
    <p>Estoy haciendo una web estática.</p>
</section>

<section>
    <h2>Contenido</h2>
    <ul>
        <li>HTML</li>
        <li>CSS</li>
        <li>GitHub Pages</li>
    </ul>
</section>

<footer>
    <p>© 2026 Mi Web</p>
</footer>

</body>
</html>
